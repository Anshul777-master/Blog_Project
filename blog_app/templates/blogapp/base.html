<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Auth Blog{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --glass-light: rgba(255,255,255,0.25);
            --glass-dark: rgba(30,30,30,0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            color: #333;
            transition: 0.3s;
        }

        /* DARK MODE */
        body.dark-mode {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #e4e4e4;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        body.dark-mode .navbar {
            background: rgba(0,0,0,0.4);
        }

        .navbar-brand {
            font-weight: 600;
        }

        /* GLASS EFFECT */
        .glass {
            background: var(--glass-light);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        body.dark-mode .glass {
            background: var(--glass-dark);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* BUTTONS */
        .btn-primary {
            background: rgba(255,255,255,0.3);
            border: none;
            backdrop-filter: blur(8px);
        }

        .btn-primary:hover {
            background: rgba(255,255,255,0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            border: none;
        }

        /* INPUTS */
        input, textarea {
            background: rgba(255,255,255,0.2) !important;
            border: 1px solid rgba(255,255,255,0.3) !important;
        }

        body.dark-mode input,
        body.dark-mode textarea {
            background: rgba(255,255,255,0.05) !important;
            color: #fff;
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
        }

        /* SMOOTH SCROLL */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">

        <!-- BRAND -->
        <a class="navbar-brand" href="{% url 'home' %}">🚀 Auth Blog</a>

        <!-- RIGHT SIDE -->
        <div class="ms-auto d-flex align-items-center gap-2">

            <!-- DARK MODE BUTTON -->
            <button onclick="toggleDarkMode()" class="btn btn-sm btn-outline-dark">
                🌙
            </button>

            {% if user.is_authenticated %}
                <span class="nav-link">👋 {{ user.username }}</span>

                <a class="btn btn-sm btn-primary" href="{% url 'create_post' %}">
                    + Create Post
                </a>

                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        Logout
                    </button>
                </form>

            {% else %}
                <a class="btn btn-sm btn-outline-primary" href="{% url 'login' %}">
                    Login
                </a>

                <a class="btn btn-sm btn-primary" href="{% url 'signup' %}">
                    Signup
                </a>
            {% endif %}

        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<main class="container">
    {% block content %}{% endblock %}
</main>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
    }
}
</script>

</body>
</html>
